# Foresight / 视界线 — Nginx 站点配置
# 放置路径: /etc/nginx/sites-available/foresight
# 然后软链接: sudo ln -s /etc/nginx/sites-available/foresight /etc/nginx/sites-enabled/

server {
    listen 8080;
    # 如需改端口，把上面 8080 换成你想要的端口（如 8010），然后重载 Nginx

    server_name _;
    root /var/www/foresight;
    index index.html;

    # 静态文件缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 首页与前端路由（Next.js 静态导出）
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    # /admin 路径特殊处理（静态导出为 admin.html）
    location /admin {
        try_files $uri $uri.html /admin.html;
    }

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json application/xml text/xml;
}
